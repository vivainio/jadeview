name: Publish

# Publishes to the VS Code Marketplace (and optionally Open VSX) when a
# version tag is pushed, e.g.:
#   npm version 1.2.0   # bumps package.json and creates the v1.2.0 tag
#   git push --follow-tags
on:
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: npm

    - name: Install dependencies
      run: npm install

    # Gate the publish on the full suite. `npm test` runs pretest (compile +
    # lint) first; Electron needs a display, so wrap it in xvfb on the headless
    # Linux runner.
    - name: Test
      run: xvfb-run -a npm test

    - name: Publish to VS Code Marketplace
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      run: npx @vscode/vsce publish --pat "$VSCE_PAT"

    # Optional: only runs if an OVSX_PAT secret is configured.
    - name: Publish to Open VSX
      if: ${{ env.OVSX_PAT != '' }}
      run: npx ovsx publish --pat "$OVSX_PAT"
