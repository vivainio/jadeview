name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: npm

    - name: Install dependencies
      run: npm install

    # `npm test` runs `pretest` first (compile + lint), then the VS Code
    # integration tests in Electron. Electron needs a display, so on headless
    # Linux runners we wrap it in xvfb-run.
    - name: Test (Linux)
      if: runner.os == 'Linux'
      run: xvfb-run -a npm test

    - name: Test (Windows/macOS)
      if: runner.os != 'Linux'
      run: npm test
