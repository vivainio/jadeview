name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Compile
      run: npm run compile

    - name: Lint
      run: npm run lint

    # The VS Code integration tests run in Electron, which needs a display on
    # headless Linux runners — hence xvfb-run.
    - name: Test
      run: xvfb-run -a npm test
